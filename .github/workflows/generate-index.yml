name: Regenerate Hub Index

on:
  push:
    branches: [main]
    paths:
      - hub-config.json
      - registry-catalog.jsonld
      - hub-index.json
      - package.json
      - package-lock.json
      - schemas/**
      - scripts/**
      - .github/workflows/**
  repository_dispatch:
    types: [leaf-registry-updated]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Echo dispatch payload
        run: |
          echo 'Dispatch payload:'
          echo '${{ toJson(github.event.client_payload) }}'

      - name: Check out hub repository
        uses: actions/checkout@v4
        with:
          path: registry-hub-repo
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: registry-hub-repo/package-lock.json

      - name: Clone sibling registries
        run: |
          git clone --depth 1 https://github.com/skillinterop/skill-registry.git skill-registry
          git clone --depth 1 https://github.com/skillinterop/cao-profile-registry.git cao-profile-registry
          git clone --depth 1 https://github.com/skillinterop/reprogate-registry.git reprogate-registry

      - name: Install hub dependencies
        working-directory: registry-hub-repo
        run: npm ci

      - name: Regenerate hub index
        working-directory: registry-hub-repo
        run: REGISTRY_USE_LOCAL_SOURCES=1 REGISTRY_WORKSPACE_ROOT="$GITHUB_WORKSPACE" bash scripts/generate-index.sh

      - name: Validate regenerated contracts
        working-directory: registry-hub-repo
        run: REGISTRY_USE_LOCAL_SOURCES=1 REGISTRY_WORKSPACE_ROOT="$GITHUB_WORKSPACE" bash scripts/validate-registry-contracts.sh

      - name: Require dedicated bot secrets
        env:
          HUB_REGEN_BOT_TOKEN: ${{ secrets.HUB_REGEN_BOT_TOKEN }}
          HUB_REGEN_BOT_NAME: ${{ secrets.HUB_REGEN_BOT_NAME }}
          HUB_REGEN_BOT_EMAIL: ${{ secrets.HUB_REGEN_BOT_EMAIL }}
        run: |
          test -n "$HUB_REGEN_BOT_TOKEN" || { echo "HUB_REGEN_BOT_TOKEN is required" >&2; exit 1; }
          test -n "$HUB_REGEN_BOT_NAME" || { echo "HUB_REGEN_BOT_NAME is required" >&2; exit 1; }
          test -n "$HUB_REGEN_BOT_EMAIL" || { echo "HUB_REGEN_BOT_EMAIL is required" >&2; exit 1; }

      - name: Commit regenerated hub index
        working-directory: registry-hub-repo
        env:
          HUB_REGEN_BOT_TOKEN: ${{ secrets.HUB_REGEN_BOT_TOKEN }}
          HUB_REGEN_BOT_NAME: ${{ secrets.HUB_REGEN_BOT_NAME }}
          HUB_REGEN_BOT_EMAIL: ${{ secrets.HUB_REGEN_BOT_EMAIL }}
        run: |
          git config user.name "$HUB_REGEN_BOT_NAME"
          git config user.email "$HUB_REGEN_BOT_EMAIL"
          git remote set-url origin "https://x-access-token:${HUB_REGEN_BOT_TOKEN}@github.com/${{ github.repository }}.git"
          git add hub-index.json

          if git diff --staged --quiet; then
            echo "hub-index.json already up to date"
            exit 0
          fi

          git commit -m "chore: regenerate hub-index.json [skip ci]"
          git push origin HEAD:main
